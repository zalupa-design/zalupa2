<script>
  const payBtn = document.getElementById("payBtn");
  const translateBtn = document.getElementById("translateBtn");
  const sourceText = document.getElementById("sourceText");
  const resultText = document.getElementById("resultText");
  const statusText = document.getElementById("statusText");

  let isPaid = false;

  payBtn.addEventListener("click", async () => {
    statusText.textContent = "Открываем оплату 1 ₽...";
    payBtn.disabled = true;

    await new Promise(resolve => setTimeout(resolve, 1000));

    isPaid = true;
    translateBtn.disabled = false;
    statusText.textContent = "Оплата получена. Теперь можно переводить 1 текст.";
    payBtn.textContent = "Оплачено ✅";
  });

  function fakeTranslateToEnglish(text) {
    const dictionary = {
      "привет": "hello",
      "как дела": "how are you",
      "я": "I",
      "ты": "you",
      "мы": "we",
      "люблю": "love",
      "ненавижу": "hate",
      "дом": "house",
      "работа": "work",
      "машина": "car",
      "сегодня": "today",
      "завтра": "tomorrow",
      "хочу": "want",
      "есть": "eat",
      "спать": "sleep"
    };

    let out = text.toLowerCase();

    for (const [ru, en] of Object.entries(dictionary)) {
      const re = new RegExp(`\\b${ru}\\b`, "gi");
      out = out.replace(re, en);
    }

    return out;
  }

  function addRoastTone(text) {
    const intros = [
      "Well, obviously: ",
      "In case that was somehow unclear: ",
      "Brace yourself, because here it is: ",
      "With unnecessary dramatic energy: ",
      "Here comes the grand statement: "
    ];

    const midPhrases = [
      " truly groundbreaking,",
      " with spectacular confidence,",
      " as if the universe asked for it,",
      " in all its dramatic glory,",
      " with maximum theatrical effect,"
    ];

    const endings = [
      " You're welcome.",
      " Try to keep up.",
      " A masterpiece, really.",
      " Stunningly obvious.",
      " And yes, that was the point."
    ];

    const longExtras = [
      " Honestly, this took far more ceremony than it deserved.",
      " One could have said it simpler, but where is the fun in that?",
      " The level of drama here is completely unnecessary, yet appreciated.",
      " This could have been normal, but apparently we chose spectacle.",
      " Remarkably intense for such a simple thought."
    ];

    const intro = intros[Math.floor(Math.random() * intros.length)];
    const mid = midPhrases[Math.floor(Math.random() * midPhrases.length)];
    const ending = endings[Math.floor(Math.random() * endings.length)];

    let result = intro + text + mid + ending;

    if (text.length > 120) {
      const extra = longExtras[Math.floor(Math.random() * longExtras.length)];
      result += extra;
    }

    return result;
  }

  translateBtn.addEventListener("click", async () => {
    const text = sourceText.value.trim();

    if (!isPaid) {
      statusText.textContent = "Сначала оплатите 1 ₽.";
      return;
    }

    if (!text) {
      statusText.textContent = "Введите текст для перевода.";
      return;
    }

    translateBtn.disabled = true;
    statusText.textContent = "Переводим...";

    try {
      await new Promise(resolve => setTimeout(resolve, 800));

      const translated = fakeTranslateToEnglish(text);
      const roastVersion = addRoastTone(translated);

      resultText.textContent = roastVersion;

      isPaid = false;
      payBtn.disabled = false;
      payBtn.textContent = "Оплатить 1 ₽";
      translateBtn.disabled = true;
      statusText.textContent = "Перевод готов. Для следующего перевода снова оплатите 1 ₽.";
    } catch (error) {
      statusText.textContent = "Ошибка перевода. Попробуйте ещё раз.";
      translateBtn.disabled = false;
    }
  });
</script>
</body>
</html>
