<!DOCTYPE html>
<html>
<head>
  <title>Мой сайт</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .hero {
      padding: 100px 20px;
    }

    h1 {
      font-size: 48px;
    }

    p {
      font-size: 20px;
      color: #aaa;
    }

    .btn {
      margin-top: 20px;
      padding: 15px 30px;
      background: #ff4d4d;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 18px;
      border-radius: 8px;
    }

    .btn:hover {
      background: #ff1a1a;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Мой первый сайт 🚀</h1>
    <p>Я сделал это сам</p>
    <button class="btn">ZALOOOOOPA!!!</button>
  </div>

</body>
</html>
