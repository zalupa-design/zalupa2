<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>zaloOpa translate</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      color: #202124;
    }

    .topbar {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .topbar span {
      color: #1a73e8;
    }

    .wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .translator {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .panel {
      background: white;
      border-radius: 20px;
      border: 1px solid #ddd;
      min-height: 300px;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 15px;
      border-bottom: 1px solid #eee;
      color: gray;
    }

    textarea, .output {
      flex: 1;
      border: none;
      padding: 20px;
      font-size: 22px;
      outline: none;
      resize: none;
    }

    .output {
      background: #f1f3f4;
    }

    .center-controls {
      text-align: center;
      margin-top: 30px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      margin: 10px;
      cursor: pointer;
    }

    .pay-btn {
      background: #1a73e8;
      color: white;
    }

    .translate-btn {
      background: #34a853;
      color: white;
    }

    .translate-btn:disabled {
      background: gray;
    }

    .status {
      margin-top: 10px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="topbar">
  <span>zaloOpa</span> translate
</div>

<div class="wrapper">

  <div class="translator">
    
    <div class="panel">
      <div class="panel-header">Введите текст</div>
      <textarea id="sourceText" placeholder="Введите текст..."></textarea>
    </div>

    <div class="panel">
      <div class="panel-header">Перевод</div>
      <div id="resultText" class="output">Здесь будет перевод</div>
    </div>

  </div>

  <div class="center-controls">
    <button class="pay-btn" id="payBtn">Оплатить 1 ₽</button>
    <button class="translate-btn" id="translateBtn" disabled>Перевести</button>
    <div class="status" id="statusText">Сначала оплатите 1 ₽</div>
  </div>

</div>

<script>
  const payBtn = document.getElementById("payBtn");
  const translateBtn = document.getElementById("translateBtn");
  const sourceText = document.getElementById("sourceText");
  const resultText = document.getElementById("resultText");
  const statusText = document.getElementById("statusText");

  let isPaid = false;

  // ДЕМО ОПЛАТА
  payBtn.addEventListener("click", async () => {
    statusText.textContent = "Оплата...";
    payBtn.disabled = true;

    await new Promise(r => setTimeout(r, 1000));

    isPaid = true;
    translateBtn.disabled = false;
    statusText.textContent = "Оплачено. Можешь переводить.";
    payBtn.textContent = "Оплачено ✅";
  });

  // ФЕЙК ПЕРЕВОД
  function fakeTranslate(text) {
    return text.split("").reverse().join("");
  }

  // САРКАСТИЧНЫЙ СТИЛЬ (без оскорблений)
  function roast(text) {
    const intro = [
      "Ну да, конечно: ",
      "Как неожиданно: ",
      "Сейчас будет гениально: "
    ];

    const ending = [
      " Просто шедевр.",
      " Гениально, правда.",
      " Это было очевидно."
    ];

    let result =
      intro[Math.floor(Math.random()*intro.length)] +
      text +
      ending[Math.floor(Math.random()*ending.length)];

    if (text.length > 100) {
      result += " Слишком много слов ради такой простой мысли.";
    }

    return result;
  }

  translateBtn.addEventListener("click", async () => {
    const text = sourceText.value.trim();

    if (!isPaid) {
      statusText.textContent = "Сначала оплатите.";
      return;
    }

    if (!text) {
      statusText.textContent = "Введите текст.";
      return;
    }

    statusText.textContent = "Переводим...";
    translateBtn.disabled = true;

    await new Promise(r => setTimeout(r, 800));

    const translated = fakeTranslate(text);
    const styled = roast(translated);

    resultText.textContent = styled;

    isPaid = false;
    payBtn.disabled = false;
    payBtn.textContent = "Оплатить 1 ₽";
    translateBtn.disabled = true;
    statusText.textContent = "Готово. Для нового перевода снова оплати.";
  });
</script>

</body>
</html>
